<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.calculator{
    width:350px;
    background:#1e1e2f;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    background:#0d1117;
    color:#00ff99;
    font-size:32px;
    text-align:right;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#2b2b3c;
    color:white;
}

.operator{
    background:#ff9800;
    color:white;
}

.equal{
    background:#00c853;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#e53935;
    color:white;
}

.delete{
    background:#546e7a;
    color:white;
}
</style>

</head>
<body>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="delete" onclick="deleteLast()">DEL</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

const display=document.getElementById("display");

function append(value){
    display.value+=value;
}

function clearDisplay(){
    display.value="";
}

function deleteLast(){
    display.value=display.value.slice(0,-1);
}

function calculate(){

    try{
        display.value=eval(display.value);
    }
    catch{
        display.value="Error";
    }

}

// Keyboard Support
document.addEventListener("keydown",function(e){

    if((e.key>='0' && e.key<='9') ||
       ['+','-','*','/','.','%'].includes(e.key)){
        append(e.key);
    }

    else if(e.key==="Enter"){
        calculate();
    }

    else if(e.key==="Backspace"){
        deleteLast();
    }

    else if(e.key==="Escape"){
        clearDisplay();
    }

});

</script>

</body>
</html>
