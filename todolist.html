<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.container h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.input-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.input-box input{
    flex:1;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

.input-box input:focus{
    border-color:#007bff;
}

.input-box button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

.input-box button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
}

li{
    background:#f5f5f5;
    margin-bottom:12px;
    padding:12px 15px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.task{
    cursor:pointer;
    flex:1;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.delete{
    background:#dc3545;
    color:#fff;
    border:none;
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
}

.delete:hover{
    background:#b02a37;
}

@media(max-width:500px){

.container{
    width:95%;
}

.input-box{
    flex-direction:column;
}

.input-box button{
    width:100%;
}

}
</style>

</head>
<body>

<div class="container">

<h2>📝 To-Do List</h2>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter a task...">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

const input=document.getElementById("taskInput");
const list=document.getElementById("taskList");

function addTask(){

    if(input.value.trim()===""){
        alert("Please enter a task.");
        return;
    }

    let li=document.createElement("li");

    let span=document.createElement("span");
    span.className="task";
    span.innerText=input.value;

    span.onclick=function(){
        span.classList.toggle("completed");
    };

    let del=document.createElement("button");
    del.innerText="Delete";
    del.className="delete";

    del.onclick=function(){
        li.remove();
    };

    li.appendChild(span);
    li.appendChild(del);

    list.appendChild(li);

    input.value="";
    input.focus();
}

input.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        addTask();
    }

});

</script>

</body>
</html>
